# tmux configuration
# Prefix is Ctrl-a (easier reach than the default Ctrl-b)

# ── Prefix ──────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ─────────────────────────────────────────────────
set -g mouse on                 # mouse: select panes, resize, scroll
set -g base-index 1             # windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on      # renumber when a window closes
set -g history-limit 10000
set -sg escape-time 0           # no delay for ESC (better for vim)
set -g default-terminal "tmux-256color"

# ── Splits: mirror WezTerm/iTerm muscle memory ──────────────
# prefix + |  → vertical split (side by side)
# prefix + -  → horizontal split (stacked)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation: prefix + h/j/k/l (vim style) ───────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Reload config: prefix + r ───────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ── Status bar ──────────────────────────────────────────────
set -g status-style "bg=default fg=white"
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M"
set -g status-right-length 50
